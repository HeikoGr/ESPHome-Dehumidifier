substitutions:
  name: comfee-dehumidifier
  friendly_name: Comfee Luftentfeuchter

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp8266:
  board: esp01_1m

logger:
  baud_rate: 0   # UART für Midea-Protokoll – Logger über UART deaktivieren

api:
  encryption:
    key: !secret api_key_dehumidifier

ota:
  - platform: esphome
    password: !secret ota_key_dehumidifier

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: light
  use_address: 192.168.178.76
  ap:
    ssid: "${name} Fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80

external_components:
  - source:
      type: git
      url: https://github.com/HeikoGr/ESPHome-Dehumidifier
      ref: main
    components: [midea_dehum]
    refresh: 0min

uart:
  id: uart_midea
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600

midea_dehum:
  id: midea_dehum_comp
  uart_id: uart_midea
  status_poll_interval: 1000
  handshake_enabled: false # Recommended when the device comes up with unknown/NA states after boot
  state_resync_interval: 30000 # Republish current values every 30s so HA can recover after reconnects
  display_mode_setpoint: 'Setpoint'
  display_mode_continuous: 'Continuous'
  display_mode_smart: 'Smart'
  display_mode_clothes_drying: 'Dry'

climate:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    name: "Comfee Luftentfeuchter"

binary_sensor:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    bucket_full:
      name: "Bucket Full"

button:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp

sensor:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    temperature:
      name: "Current Temperature"
    humidity:
      name: "Current Humidity"
    error:
      name: "Error Code"
  - platform: wifi_signal
    name: "${friendly_name} WiFi RSSI"
    update_interval: 60s
    entity_category: diagnostic

switch:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    beep:
      name: "Beep on Command"

number:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    timer:
      name: "Internal Device Timer"

text_sensor:
  - platform: midea_dehum
    midea_dehum_id: midea_dehum_comp
    capabilities:
      name: "Device Capabilities"
